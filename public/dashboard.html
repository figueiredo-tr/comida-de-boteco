<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Placar do Boteco</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌽</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;600;700&family=Nunito+Sans:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/estilo-placar.css" />
  </head>
  <body>
    <div class="container">
      <div class="festival-banner" id="festivalBanner"></div>
      <header>
        <span class="selo" id="gatilhoAdmin">ARRAIÁ / NOITE DO BOTECO</span>
        <h1>Placar Geral</h1>
        <p class="subt">Ranking em tempo real dos 4 botecos da noite</p>
      </header>

      <div class="acesso-rapido">
        <span class="acesso-rapido-titulo">Ir direto pro formulário:</span>
        <div class="acesso-rapido-botoes" id="acessoRapido"></div>
      </div>

      <div id="conteudo">
        <div class="pombinha">carregando avaliações...</div>
      </div>

      <p class="atualizacao" id="atualizacao"></p>

      <div class="area-admin">
        <div class="admin-painel" id="adminPainel" style="display: none">
          <button type="button" class="entrar-google" id="btnAdminLogin">
            Entrar com Google
          </button>
          <button
            type="button"
            class="btn-reset"
            id="btnResetPlacar"
            style="display: none"
          >
            Resetar placar
          </button>
          <p class="admin-msg" id="adminMsg"></p>
        </div>
      </div>
    </div>

    <script type="module" src="assets/placar.js"></script>
  </body>
</html>
