<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Comida de Boteco</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌽</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;600;700&family=Nunito+Sans:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/estilo-placar.css" />
    <style>
      .area-admin-login {
        text-align: center;
        padding: 40px 20px;
      }
      .admin-acoes {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin: 16px 0 24px;
        flex-wrap: wrap;
      }
      .btn-exportar {
        background: var(--verde-bandeira, #2f5233);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 18px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="hero-festival" id="festivalBanner"></div>

      <div class="area-admin-login" id="areaLogin">
        <button type="button" class="entrar-google" id="btnAdminLogin">
          Entrar com Google
        </button>
        <p class="admin-msg" id="adminMsg"></p>
      </div>

      <div id="areaAdmin" style="display: none">
        <div class="secao-titulo">
          <h2>🏆 Placar Geral (admin)</h2>
          <p class="subt">Ranking em tempo real dos restaurantes</p>
        </div>

        <div class="admin-acoes">
          <button type="button" class="btn-exportar" id="btnExportarPDF">
            🖨️ Exportar / Imprimir PDF
          </button>
          <button type="button" class="btn-reset" id="btnResetPlacar">
            Resetar placar
          </button>
        </div>

        <div id="relatorio">
          <div id="conteudo">
            <div class="pombinha">carregando avaliações...</div>
          </div>
        </div>

        <p class="atualizacao" id="atualizacao"></p>
      </div>
    </div>

    <script type="module" src="assets/admin.js"></script>
  </body>
</html>
